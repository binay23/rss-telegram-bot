name: RSS to Telegram

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  rss-job:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch RSS and send
        run: |
          DATA=$(curl -s https://www.firstpost.com/commonfeeds/v1/mfp/rss/home.xml)

          TITLE=$(echo "$DATA" | grep -oP '(?<=<title>).*?(?=</title>)' | sed -n '2p')
          LINK=$(echo "$DATA" | grep -oP '(?<=<link>).*?(?=</link>)' | sed -n '2p')

          MESSAGE="$TITLE\n$LINK"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.CHAT_ID }} \
          -d text="$MESSAGE"
