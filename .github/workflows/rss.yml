name: RSS to Telegram

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Send RSS to Telegram
        run: |
  DATA=$(curl -s "https://api.rss2json.com/v1/api.json?rss_url=https://www.firstpost.com/commonfeeds/v1/mfp/rss/home.xml")
  TITLE=$(echo $DATA | jq -r '.items[0].title')
  LINK=$(echo $DATA | jq -r '.items[0].link')
  curl -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
  -d "chat_id=${{ secrets.CHAT_ID }}" \
  -d "text=$TITLE $LINK"
